name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  test:
    runs-on: [self-hosted, Linux, X64]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: go build ./...
      - run: go test ./... -v -race -count=1

  wfctl-strict-contracts:
    name: Validate strict plugin contracts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Fail if plugin.json is missing
        run: test -f plugin.json || (echo "ERROR: plugin.json not found" && exit 1)
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Validate plugin manifest (wfctl)
        run: go run github.com/GoCodeAlone/workflow/cmd/wfctl@v0.3.56 plugin validate --file plugin.json
