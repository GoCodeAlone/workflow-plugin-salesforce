name: Release
on:
  push:
    tags: ["v*"]
permissions:
  contents: write
jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
      - uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Sync manifest to registry
        if: success() && env.GH_TOKEN != ''
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.REGISTRY_PAT }}
        run: |
          git clone https://x-access-token:${GH_TOKEN}@github.com/GoCodeAlone/workflow-registry.git /tmp/registry
          mkdir -p /tmp/registry/plugins/salesforce
          TAG=${GITHUB_REF#refs/tags/}
          VERSION=${TAG#v}
          jq --arg v "$VERSION" '.version = $v' plugin.json > /tmp/registry/plugins/salesforce/manifest.json
          cd /tmp/registry
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add plugins/salesforce/manifest.json
          git diff --cached --quiet || git commit -m "chore: sync salesforce plugin manifest v${VERSION}"
          git push

  notify-registry:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [release]
    runs-on: ubuntu-latest
    steps:
      - name: Notify workflow-registry
        if: env.GH_TOKEN != ''
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.REGISTRY_PAT }}
          repository: GoCodeAlone/workflow-registry
          event-type: plugin-release
          client-payload: >-
            {"plugin": "${{ github.repository }}", "tag": "${{ github.ref_name }}"}
        env:
          GH_TOKEN: ${{ secrets.REGISTRY_PAT }}
        continue-on-error: true
