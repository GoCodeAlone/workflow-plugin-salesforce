name: Release
on:
  push:
    tags: ["v*"]
permissions:
  contents: write
jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - uses: goreleaser/goreleaser-action@v7
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [release]
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Publish GitHub release
        uses: actions/github-script@v7
        with:
          github-token: ${{ github.token }}
          script: |
            const tag = process.env.GITHUB_REF_NAME;
            const { owner, repo } = context.repo;
            const { data: release } = await github.rest.repos.getReleaseByTag({ owner, repo, tag });
            if (release.draft) {
              await github.rest.repos.updateRelease({
                owner,
                repo,
                release_id: release.id,
                draft: false,
              });
            }

  sync-registry:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [publish-release]
    continue-on-error: true
    runs-on: ubuntu-latest
    steps:
      - name: Check out plugin
        uses: actions/checkout@v6
        with:
          path: plugin

      - name: Check out workflow-registry
        uses: actions/checkout@v6
        with:
          repository: GoCodeAlone/workflow-registry
          token: ${{ secrets.REGISTRY_PAT }}
          path: workflow-registry

      - name: Update workflow-registry manifest
        run: |
          registry_dir="$GITHUB_WORKSPACE/workflow-registry"
          mkdir -p "$registry_dir/plugins/salesforce"
          TAG=${GITHUB_REF#refs/tags/}
          VERSION=${TAG#v}
          jq --arg v "$VERSION" --arg tag "$TAG" '
            .version = $v |
            .downloads = ((.downloads // []) | map(.url |= sub("/releases/download/v[^/]+/"; "/releases/download/" + $tag + "/")))
          ' "$GITHUB_WORKSPACE/plugin/plugin.json" > "$registry_dir/plugins/salesforce/manifest.json"
          cd "$registry_dir"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add plugins/salesforce/manifest.json
          git diff --cached --quiet || git commit -m "chore: sync salesforce plugin manifest v${VERSION}"
          git push

      - name: Notify workflow-registry
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.REGISTRY_PAT }}
          repository: GoCodeAlone/workflow-registry
          event-type: plugin-release
          client-payload: >-
            {"plugin": "${{ github.repository }}", "tag": "${{ github.ref_name }}"}
        continue-on-error: true
