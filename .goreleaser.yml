version: 2
project_name: workflow-plugin-salesforce

before:
  hooks:
    - go mod tidy
    - "sed -i.bak 's/\"version\": \".*\"/\"version\": \"{{ .Version }}\"/' plugin.json && rm -f plugin.json.bak"

builds:
  - id: plugin
    main: ./cmd/workflow-plugin-salesforce
    binary: workflow-plugin-salesforce
    env: [CGO_ENABLED=0]
    goos: [linux, darwin]
    goarch: [amd64, arm64]
    ldflags: ["-s", "-w", "-X github.com/GoCodeAlone/workflow-plugin-salesforce/internal.Version={{.Version}}"]
archives:
  - id: plugin
    builds: [plugin]
    name_template: "{{ .ProjectName }}-{{ .Os }}-{{ .Arch }}"
    format: tar.gz
    files:
      - plugin.json
      - LICENSE
checksum:
  name_template: checksums.txt
release:
  github:
    owner: GoCodeAlone
    name: workflow-plugin-salesforce
